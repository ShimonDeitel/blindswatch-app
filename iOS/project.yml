name: Blindswatch
options:
  bundleIdPrefix: com.shimondeitel.blindswatch
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Blindswatch:
    type: application
    platform: iOS
    sources:
      - path: Blindswatch
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.blindswatch
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Blindswatch/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  BlindswatchTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: BlindswatchTests
      - path: Blindswatch.storekit
    dependencies:
      - target: Blindswatch
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.blindswatch.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  BlindswatchUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: BlindswatchUITests
    dependencies:
      - target: Blindswatch
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.blindswatch.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Blindswatch:
    build:
      targets:
        Blindswatch: all
        BlindswatchTests: [test]
        BlindswatchUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Blindswatch.storekit
    test:
      config: Debug
      storeKitConfiguration: Blindswatch.storekit
      targets:
        - BlindswatchTests
        - BlindswatchUITests
    archive:
      config: Release
